repos:
  - repo: local
    hooks:
      - id: regenerate-stac
        name: Regenerate stac/ catalog
        entry: scripts/generate
        language: system
        pass_filenames: false
        # Generation reads exclusively from src/ (catalog.py, prose, models, etc.)
        # so only re-run when something there changed. The script itself opens
        # each dataset's icechunk store on S3, so it needs network and ~20s.
        files: ^src/
