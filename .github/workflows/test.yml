name: Test

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [reformatters-main-push]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: dynamical-org/reformatters
          path: reformatters
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv sync --group integration
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pytest tests/ -m "not integration"
        env:
          REFORMATTERS_DIR: ${{ github.workspace }}/reformatters
      - run: uv run pytest tests/ -m integration --ignore=tests/test_released_catalog_read.py
        env:
          REFORMATTERS_DIR: ${{ github.workspace }}/reformatters

  # Per-target compatibility checks. Each matrix entry shows up as its own
  # PR status check so a breaking change surfaces as `compat (0.3.0) ❌`
  # rather than hiding inside the main test job.
  #
  # Entries must be kept in sync with SUPPORTED_RELEASES + TRACKED_REFS in
  # tests/test_released_catalog_read.py — the sanity-check test in that file
  # fails if they diverge. Released versions (e.g. "0.4.0") install from
  # PyPI; non-semver entries (e.g. "main") install from the matching git ref
  # on dynamical-org/dynamical-catalog, and should be treated as an advisory
  # canary rather than a merge blocker.
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dynamical-catalog-target:
          - "0.3.0"
          - "0.4.0"
          - "main"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv sync --group integration
      - run: uv run pytest tests/test_released_catalog_read.py -m integration -k "[${{ matrix.dynamical-catalog-target }}]" -v

  notify-on-failure:
    needs: test
    if: failure() && github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Open issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_SHA: ${{ github.event.client_payload.sha }}
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "STAC version check failed after reformatters push" \
            --body "Triggered by reformatters ref \`${DISPATCH_REF}\` at \`${DISPATCH_SHA}\`.

          Run: ${RUN_URL}"
