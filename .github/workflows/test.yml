name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: dynamical-org/reformatters
          path: reformatters
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest tests/
        env:
          REFORMATTERS_DIR: ${{ github.workspace }}/reformatters
