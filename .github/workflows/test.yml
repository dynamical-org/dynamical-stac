name: Test

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [reformatters-main-push]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: dynamical-org/reformatters
          path: reformatters
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv sync --group integration
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pytest tests/ --ignore=tests/test_released_catalog_read.py
        env:
          REFORMATTERS_DIR: ${{ github.workspace }}/reformatters

  # Per-target compatibility checks. Each matrix entry shows up as its own
  # PR status check (via the job-level `name:` template) so a breaking
  # change surfaces as `compat (0.5.0) ❌` rather than hiding inside the
  # main test job.
  #
  # The matrix is built fresh on every run by scripts/compat_matrix.py:
  # every non-yanked stable dynamical-catalog release on PyPI (>= the
  # MIN_VERSION floor in that script) plus every entry in CANARY_REFS.
  # That means a newly-published release lands in the matrix on the
  # next CI run with no edits here or in the test file.
  #
  # Each `include` entry the script emits carries:
  #   target:        the human-readable thing we're testing (PyPI version
  #                  or git ref), shown in the status check name.
  #   id:            the shell-safe pytest parametrize id used for the -k
  #                  filter — alphanumerics + underscore only, so `[`/`.`
  #                  in semver versions can't trip pytest's -k parser.
  #   allow-failure: false for PyPI releases (support contract); true for
  #                  canary refs like `main`, where a dynamical-catalog
  #                  breakage shouldn't block dynamical-stac PRs.
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Stdlib-only script; no `uv sync` needed, runs in ~1 second.
      - id: build
        run: python scripts/compat_matrix.py >> "$GITHUB_OUTPUT"

  compat:
    needs: discover
    name: "compat (${{ matrix.target }})"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow-failure }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv sync --group integration
      - run: uv run pytest tests/test_released_catalog_read.py -m integration -k "${{ matrix.id }}" -v

  notify-on-failure:
    needs: test
    if: failure() && github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Open issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_SHA: ${{ github.event.client_payload.sha }}
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "STAC version check failed after reformatters push" \
            --body "Triggered by reformatters ref \`${DISPATCH_REF}\` at \`${DISPATCH_SHA}\`.

          Run: ${RUN_URL}"
