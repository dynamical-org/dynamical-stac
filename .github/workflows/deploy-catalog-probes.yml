name: Deploy catalog probes to Modal

on:
  push:
    branches: [main]
    paths:
      - scripts/catalog_probes.py
      - .github/workflows/deploy-catalog-probes.yml
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-catalog-probes
  cancel-in-progress: true

jobs:
  deploy:
    # workflow_dispatch can target any branch; never expose prod Modal
    # credentials to a deploy from anything but main.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      # modal is a deploy-time tool, not a project dependency — pull it in
      # ephemerally rather than adding it to pyproject/uv.lock.
      - name: Deploy
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: uv run --no-project --with modal modal deploy scripts/catalog_probes.py
