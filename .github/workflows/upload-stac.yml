name: Upload STAC catalog

on:
  push:
    branches: [main]
    paths: ["stac/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: upload-stac
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv run --locked python src/__main__.py upload stac
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_STAC_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_STAC_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_STAC_SECRET_ACCESS_KEY }}
      - name: Trigger dynamical.org rebuild
        env:
          DEPLOY_HOOK: ${{ secrets.DYNAMICAL_ORG_DEPLOY_HOOK }}
        run: curl -fsS -d "" "$DEPLOY_HOOK"

  notify-on-failure:
    needs: upload
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Open issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "STAC upload failed" \
            --body "Run: ${RUN_URL}"
